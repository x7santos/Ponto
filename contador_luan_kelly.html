<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luan e Kelly 💖</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right, #ff4e92, #ffb347);
    color: white;
    text-align: center;
  }
  .container {
    padding: 20px;
  }
  h1 {
    font-size: 2.5em;
    margin-top: 20px;
  }
  .contador {
    font-size: 1.5em;
    margin: 20px 0;
    background: rgba(0,0,0,0.3);
    display: inline-block;
    padding: 15px;
    border-radius: 15px;
  }
  .mensagem {
    margin-top: 30px;
    font-size: 1.2em;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .foto {
    margin-top: 20px;
    border-radius: 20px;
    max-width: 90%;
    height: auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }
  iframe {
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Luan ❤️ Kelly</h1>
  <div class="contador" id="contador"></div>
  <div class="mensagem">
    Amor, hoje completamos mais um aniversário de noivado e, a cada ano que passa, só aumenta a certeza de que quero viver o resto da vida contigo. Eu te amo!
  </div>
  <img src="foto.jpg" alt="Foto do casal" class="foto">

  <!-- Música em background -->
  <iframe width="0" height="0" src="https://www.youtube.com/embed/xZiYdCediK8?autoplay=1&loop=1" frameborder="0" allow="autoplay"></iframe>
</div>
<script>
function atualizarContador() {
  const inicio = new Date("2023-12-30T23:00:00");
  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diff / (1000 * 60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("contador").innerText = 
    `${dias} dias, ${horas} horas, ${minutos} minutos e ${segundos} segundos juntos ❤️`;
}
setInterval(atualizarContador, 1000);
atualizarContador();
</script>
</body>
</html>
